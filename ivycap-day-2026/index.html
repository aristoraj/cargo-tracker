<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvyCap Day 2026 - Register</title>
<style>
  body { font-family: Arial, sans-serif; }
  #zbs-register-widget-btn { display: none; }
</style>
</head>
<body>

	<!-- Hidden — the widget binds its click handler to this element; we
	     trigger that click programmatically instead of asking the visitor
	     to click it themselves. This is what skips straight to the ticket
	     class instead of showing the full ticket list first. -->
	<button id='zbs-register-widget-btn' style="padding: 12px;background: #026835;border: 1px solid #026835;color: #ffffff;font-weight: bold;text-transform: uppercase">Register now</button>

	<div id='zbs-register-widget-section'></div>
	<link rel='stylesheet' href='https://static.zohocdn.com/backstage/v1.0/styles/ticket-widget/v1.3/register-widget.min.css'>
	<script src='https://static.zohocdn.com/backstage/v1.0/javascript/ticket-widget/v1.3/register-widget.min.js'></script>
	<script>
		window.ZBSCheckOutWidget._createWidget({
			eventUrl: 'https://ivycapventures.zohobackstage.in/embed/test3/buyTickets',
			modal: false,
			clickableElements: [],
			ticketClassIdVsSelectorMap: {
				'41449000000797252': ['#zbs-register-widget-btn']
			},
			ticketGroupIdVsSelectorMap: {},
			skipValidation: false,
			widgetOptions: {
				theme: {
					primaryButton: {
						backgroundColor: '#026835',
						textColor: '#ffffff',
						borderColor: '#026835'
					},
					eventHeader: {
						backgroundColor: '#026835',
						textColor: '#ffffff'
					}
				},
				visibilityOptions: {
					showEventHeader: false,
					showCheckoutProgress: false,
					showBSBranding: false,
					showEventDate: true,
					showEventVenue: true,
					ticketClassIds: [],
					ticketItemGroupIds: []
				},
				redirectUrl: '',
				affiliate: '',
				promoCode: '',
				showFillInfo: false,
				showRegisterModalWithInfoPage: false,
				messageContents : {
					'lbl.closed': 'closed',
					'lbl.yet.to.start': 'yet to start',
					'lbl.sales.ended': 'sales ended',
					'lbl.unavailable': 'unavailable',
					'lbl.sold.out': 'sold out',
					'lbl.open': 'register now'
				}
			},
			onOrderComplete: function (event) {},
			onClose: function (event) {}
		}, '#zbs-register-widget-section');

		// Auto-click the hidden button once so the widget jumps straight to
		// this ticket class instead of showing the full ticket list first -
		// same fix used for the other event. Single click only (not a
		// retry loop) to avoid re-triggering registration multiple times.
		window.addEventListener('load', () => {
			setTimeout(() => document.getElementById('zbs-register-widget-btn').click(), 500);
		});
	</script>

</body>
</html>
