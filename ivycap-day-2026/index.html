<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvyCap Day 2026 - Register</title>
<style>
  body { font-family: Arial, sans-serif; }
  #zbs-register-widget-btn-1 { display: none; }
</style>
</head>
<body>

	<!-- Fix from Zoho support to skip straight to the info/details step:
	     the ticket class ID is mapped directly to this button via
	     ticketClassIdVsSelectorMap, instead of the general clickableElements
	     list or a plain inline embed. Hidden and auto-clicked below so the
	     visitor never has to click it themselves. -->
	<button id='zbs-register-widget-btn-1' style="padding: 12px;background: #026835;border: 1px solid #026835;color: #ffffff;font-weight: bold;text-transform: uppercase">Register now</button>
<link rel='stylesheet' href=' https://static.zohocdn.com/backstage/v1.0/styles/ticket-widget/v1.3/register-widget.min.css'>
<script src=' https://static.zohocdn.com/backstage/v1.0/javascript/ticket-widget/v1.3/register-widget.min.js'></script>
<script>
window.ZBSCheckOutWidget._createWidget({
eventUrl: 'https://ivycapventures.zohobackstage.in/embed/IvyCapDay2026/buyTickets',
modal: true,
clickableElements: [],
ticketClassIdVsSelectorMap: {
'41449000000684501': ['#zbs-register-widget-btn-1']
},
ticketGroupIdVsSelectorMap: {},
skipValidation: false,
widgetOptions: {
theme: {
primaryButton: { backgroundColor: '#026835', textColor: '#ffffff', borderColor: '#026835' },
eventHeader: { backgroundColor: '#026835', textColor: '#ffffff' }
},
visibilityOptions: {
showEventHeader: true, showCheckoutProgress: false, showBSBranding: false,
showEventDate: true, showEventVenue: true, ticketClassIds: [], ticketItemGroupIds: []
},
redirectUrl: '', affiliate: '', promoCode: '',
showFillInfo: true, showRegisterModalWithInfoPage: false,
messageContents: {
'lbl.closed': 'closed', 'lbl.yet.to.start': 'yet to start', 'lbl.sales.ended': 'sales ended',
'lbl.unavailable': 'unavailable', 'lbl.sold.out': 'sold out', 'lbl.open': 'register now'
}
},
onOrderComplete: function (event) {},
onClose: function (event) {
// If the visitor closes the modal, there's nothing left to show on
// this page — offer the fallback button rather than a dead page.
//document.getElementById('loading').querySelector('p')?.textContent = 'Registration closed.';
//document.getElementById('manual-fallback')?.style?.display = 'inline-block';
}
});

// Auto-click the hidden button once so the visitor lands straight on
// the checkout instead of needing to click anything themselves. Only
// clicks once (not a retry loop) - retrying after the widget's handler
// has already attached re-triggers registration and duplicates the
// submitted data.
window.addEventListener('load', () => {
	setTimeout(() => document.getElementById('zbs-register-widget-btn-1').click(), 500);
});
</script>

</body>
</html>
