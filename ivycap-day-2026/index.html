<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvyCap Day 2026 - Register</title>
</head>
<body>

	<!-- ===================================================================
	     IvyCap Day 2026 — Zoho Backstage Registration Widget
	     Paste this whole block anywhere in your website's HTML where you
	     want the Register Now button to appear.
	     =================================================================== -->

	<button id='zbs-register-widget-btn' style="padding: 12px;background: #dd9f41;border: 1px solid #dd9f41;color: #ffffff;font-weight: bold;text-transform: uppercase">Register now</button>

	<link rel='stylesheet' href='https://static.zohocdn.com/backstage/v1.0/styles/ticket-widget/v1.3/register-widget.min.css'>
	<script src='https://static.zohocdn.com/backstage/v1.0/javascript/ticket-widget/v1.3/register-widget.min.js'></script>
	<script>
		window.ZBSCheckOutWidget._createWidget({
			eventUrl: 'https://ivycapventures.zohobackstage.in/embed/test3/buyTickets',
			modal: true,
			clickableElements: ['#zbs-register-widget-btn'],
			ticketClassIdVsSelectorMap: {},
			ticketGroupIdVsSelectorMap: {},
			skipValidation: false,
			widgetOptions: {
				theme: {
					primaryButton: {
						backgroundColor: '#dd9f41',
						textColor: '#ffffff',
						borderColor: '#dd9f41'
					},
					eventHeader: {
						backgroundColor: '#dd9f41',
						textColor: '#ffffff'
					}
				},
				visibilityOptions: {
					showEventHeader: true,
					showCheckoutProgress: true,
					showBSBranding: true,
					showEventDate: true,
					showEventVenue: true,
					ticketClassIds: [],
					ticketItemGroupIds: []
				},
				redirectUrl: '',
				affiliate: '',
				promoCode: '',
				showFillInfo: false,
				showRegisterModalWithInfoPage: false,
				messageContents : {
					'lbl.closed': 'closed',
					'lbl.yet.to.start': 'yet to start',
					'lbl.sales.ended': 'sales ended',
					'lbl.unavailable': 'unavailable',
					'lbl.sold.out': 'sold out',
					'lbl.open': 'register now'
				}
			},
			onOrderComplete: function (event) {
				// Runs after someone successfully completes registration.
				// Add your own logic here, e.g.:
				// window.location.href = '/thank-you';
				// or show a custom on-page message.
			},
			onClose: function (event) {
				// Runs when the modal is closed, whether or not an order was placed.
			}
		});
	</script>

</body>
</html>
