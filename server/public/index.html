<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cargo Scanner Widget — Prototype</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: Arial, sans-serif; background: #0b0b0b; color: #eee;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: #000; flex: 0 0 auto;
  }
  #topbar h1 { font-size: 15px; margin: 0; font-weight: 600; }
  #summary-toggle {
    padding: 8px 16px; font-size: 13px; font-weight: bold; border: none;
    border-radius: 6px; background: #2563eb; color: #fff;
  }
  #mode-banner { padding: 5px 14px; font-size: 11px; flex: 0 0 auto; }
  #mode-banner.mock { background: #4a3b00; color: #ffe69c; }
  #mode-banner.live { background: #123524; color: #a3cfbb; }

  #camera-wrap { position: relative; flex: 1 1 auto; min-height: 0; background: #000; }
  #reader { width: 100%; height: 100%; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }

  #scan-status {
    flex: 0 0 auto; font-size: 15px; font-weight: bold; text-align: center;
    padding: 16px 12px; transition: background 0.25s ease;
  }
  #scan-status.scanning { background: #123a5c; color: #bcdcff; }
  #scan-status.processing { background: #5c4b06; color: #ffe69c; }
  #scan-status.done { background: #123524; color: #a3cfbb; }
  #scan-status.error { background: #5c1420; color: #ffb3bd; }
  #scan-status.hint { background: #5c3200; color: #ffd2a3; }

  #backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 15; display: none; }
  #backdrop.open { display: block; }

  #summary-drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 100%; max-width: 480px;
    background: #fff; color: #111; transform: translateX(100%);
    transition: transform 0.25s ease; overflow-y: auto; padding: 16px; z-index: 20;
  }
  #summary-drawer.open { transform: translateX(0); }
  #summary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  #summary-header button { padding: 6px 14px; border: none; border-radius: 6px; background: #eee; cursor: pointer; }
  #progress { font-size: 13px; color: #333; margin-bottom: 10px; }

  #last-scan { background: #f5f5f5; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
  #last-scan.flash { animation: flash 0.4s ease; }
  @keyframes flash { 0% { background:#c8f7c5; } 100% { background:#f5f5f5; } }
  #last-scan .field { font-size: 13px; margin: 2px 0; }
  #last-scan .field b { display: inline-block; width: 90px; }

  table { border-collapse: collapse; width: 100%; }
  th, td { border: 1px solid #ddd; padding: 6px 8px; font-size: 12px; text-align: left; }
  th { background: #333; color: #fff; }
  tr.duplicate { background: #f8d7da; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Cargo Scanner</h1>
  <button id="summary-toggle">Summary</button>
</div>
<div id="mode-banner"></div>

<div id="camera-wrap">
  <div id="reader"></div>
</div>

<div id="scan-status" class="scanning">Scanning — hold a barcode in view</div>

<div id="backdrop"></div>
<div id="summary-drawer">
  <div id="summary-header">
    <strong>Scan Summary</strong>
    <button id="summary-close">Close</button>
  </div>
  <div id="progress"></div>
  <div id="last-scan">
    <div class="field"><b>AWB</b><span id="f-awb">—</span></div>
    <div class="field"><b>Piece</b><span id="f-piece">—</span></div>
    <div class="field"><b>Destination</b><span id="f-dest">—</span></div>
    <div class="field"><b>Ref</b><span id="f-ref">—</span></div>
  </div>
  <table>
    <thead>
      <tr><th>#</th><th>AWB</th><th>Piece</th><th>Dest</th><th>Ref</th><th>Img</th><th>Time</th><th>Record</th><th>Image</th></tr>
    </thead>
    <tbody id="log-body"></tbody>
  </table>
</div>

<script>
// ---------------------------------------------------------------------
// CONFIG — served from the same Express service that exposes /api/*, so
// this can just call relative paths. No separate host to configure.
// ---------------------------------------------------------------------
const SERVICE = {
  baseUrl: '',
};

const COOLDOWN_MS = 2500; // ignore an identical decode within this window
const lastSeen = new Map(); // rawPayload -> timestamp
const seenPieces = new Set(); // `${awb}|${piece}` already logged this session
let rowCount = 0;

// ---------------------------------------------------------------------
// Scan status flow: scanning -> processing -> done/error -> back to
// scanning. While idle in "scanning" with nothing decoding, cycle
// coaching hints — html5-qrcode only tells us decoded/not-decoded, not
// *why* a read is failing, so this is time-based guidance, not true
// blur/distance detection.
// ---------------------------------------------------------------------
const HINTS = [
  'Hold the barcode flat and steady inside the frame',
  'Try moving the camera a little closer to the label',
  'Try stepping back a little — it may be too close to focus',
  'Make sure the barcode is well lit and not blurry',
];
let hintIndex = 0;
let lastActivityAt = Date.now();
let isBusy = false; // true from the moment a code decodes until we revert to scanning
let revertTimer = null;

function setScanStatus(state, message) {
  const el = document.getElementById('scan-status');
  el.className = state;
  el.textContent = message;
}

function scheduleRevertToScanning(delay = 1500) {
  clearTimeout(revertTimer);
  revertTimer = setTimeout(() => {
    isBusy = false;
    lastActivityAt = Date.now(); // fresh idle window before hints resume
    setScanStatus('scanning', 'Scanning — hold next barcode in view');
  }, delay);
}

setInterval(() => {
  if (isBusy) return;
  const idleMs = Date.now() - lastActivityAt;
  if (idleMs > 4000) {
    setScanStatus('hint', HINTS[hintIndex % HINTS.length]);
    hintIndex++;
  } else {
    setScanStatus('scanning', 'Scanning — hold a barcode in view');
  }
}, 3000);

// ---------------------------------------------------------------------
// Summary drawer — keeps the camera as the primary, full-screen surface;
// the table/details only show up when explicitly asked for.
// ---------------------------------------------------------------------
function openSummary() {
  document.getElementById('summary-drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}
function closeSummary() {
  document.getElementById('summary-drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}
document.getElementById('summary-toggle').addEventListener('click', openSummary);
document.getElementById('summary-close').addEventListener('click', closeSummary);
document.getElementById('backdrop').addEventListener('click', closeSummary);

function parsePayload(raw) {
  // Expected: AWB:xxx|PC:n/total|DEST:xxx|REF:xxx
  const parts = Object.fromEntries(
    raw.split('|').map(p => {
      const idx = p.indexOf(':');
      return [p.slice(0, idx), p.slice(idx + 1)];
    })
  );
  if (!parts.AWB || !parts.PC) return null;
  const [piece, total] = parts.PC.split('/');
  return {
    awb: parts.AWB,
    piece: parseInt(piece, 10),
    total: parseInt(total, 10),
    dest: parts.DEST || '',
    ref: parts.REF || '',
    raw,
  };
}

function setModeBanner() {
  const banner = document.getElementById('mode-banner');
  banner.className = 'live';
  banner.textContent = 'Connected — records will be written live to Zoho Creator.';
}

// Step 1 of 2: create the Scan_Event record via our proxy (no image yet).
async function createRecord(record) {
  const payload = {
    awb: record.awb,
    piece: record.piece,
    total: record.total,
    dest: record.dest,
    ref: record.ref,
    raw: record.raw,
    scannedAt: new Date().toISOString(),
  };

  try {
    const resp = await fetch(`${SERVICE.baseUrl}/api/scan-events`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || `HTTP ${resp.status}`);
    return { id: json.id, raw: json };
  } catch (err) {
    console.error('Create record failed:', err);
    return { error: err };
  }
}

// Step 2 of 2: separate call to attach the captured image to the record
// just created. Kept as its own request so a failed image attach never
// blocks the record itself from being logged.
async function attachImage(recordId, blob) {
  const form = new FormData();
  form.append('file', blob, `scan-${recordId}.jpg`);

  try {
    const resp = await fetch(`${SERVICE.baseUrl}/api/scan-events/${recordId}/image`, {
      method: 'PATCH',
      body: form,
    });
    const json = await resp.json();
    if (!resp.ok) throw new Error(json.error || `HTTP ${resp.status}`);
    return { ok: true, raw: json };
  } catch (err) {
    console.error('Image attach failed:', err);
    return { error: err };
  }
}

function captureFrame() {
  const video = document.querySelector('#reader video');
  if (!video || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas; // caller pulls both a dataURL (thumbnail) and a blob (upload) from this
}

function updateProgress(awb, total) {
  const scannedForAwb = [...seenPieces].filter(k => k.startsWith(awb + '|')).length;
  document.getElementById('progress').textContent =
    `AWB ${awb}: ${scannedForAwb} / ${total} pieces scanned`;
}

async function onDecoded(raw) {
  lastActivityAt = Date.now(); // a code decoded — stop showing "can't read" hints
  if (isBusy) return; // already handling a scan; ignore reads until we revert to scanning

  const now = Date.now();
  const last = lastSeen.get(raw);
  if (last && now - last < COOLDOWN_MS) return; // debounce same frame re-reads
  lastSeen.set(raw, now);

  const record = parsePayload(raw);
  if (!record) {
    console.warn('Unrecognized barcode payload, ignored:', raw);
    return;
  }

  const pieceKey = `${record.awb}|${record.piece}`;
  const isDuplicate = seenPieces.has(pieceKey);
  if (!isDuplicate) seenPieces.add(pieceKey);

  isBusy = true;
  clearTimeout(revertTimer);
  setScanStatus('processing', `Processing piece ${record.piece}/${record.total} of AWB ${record.awb}…`);

  // UI: last-scan panel
  document.getElementById('f-awb').textContent = record.awb;
  document.getElementById('f-piece').textContent = `${record.piece} / ${record.total}`;
  document.getElementById('f-dest').textContent = record.dest;
  document.getElementById('f-ref').textContent = record.ref;
  const panel = document.getElementById('last-scan');
  panel.classList.remove('flash');
  void panel.offsetWidth; // restart animation
  panel.classList.add('flash');

  // beep
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.frequency.value = isDuplicate ? 220 : 880;
    osc.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.12);
  } catch (e) { /* audio not available, ignore */ }

  const canvas = captureFrame();
  const thumbUrl = canvas ? canvas.toDataURL('image/jpeg', 0.6) : null;

  rowCount++;
  const tr = document.createElement('tr');
  if (isDuplicate) tr.className = 'duplicate';
  tr.innerHTML = `
    <td>${rowCount}</td>
    <td>${record.awb}</td>
    <td>${record.piece}/${record.total}</td>
    <td>${record.dest}</td>
    <td>${record.ref}</td>
    <td>${thumbUrl ? `<img src="${thumbUrl}" width="60">` : '—'}</td>
    <td>${new Date().toLocaleTimeString()}</td>
    <td class="record-status">${isDuplicate ? 'DUPLICATE' : 'creating…'}</td>
    <td class="image-status">—</td>
  `;
  document.getElementById('log-body').prepend(tr);
  updateProgress(record.awb, record.total);

  // Call 1: create the record (JSON only, no image).
  const createResult = await createRecord(record);
  const recordStatusCell = tr.querySelector('.record-status');
  const imageStatusCell = tr.querySelector('.image-status');

  if (isDuplicate) {
    recordStatusCell.textContent = 'DUPLICATE';
    setScanStatus('error', `Piece ${record.piece}/${record.total} was already scanned — skipped`);
  } else if (createResult.error || !createResult.id) {
    recordStatusCell.textContent = 'create-failed';
    setScanStatus('error', `Couldn't save piece ${record.piece}/${record.total} — will keep scanning`);
  } else {
    recordStatusCell.textContent = `saved (ID ${createResult.id})`;
    setScanStatus('done', `✅ Piece ${record.piece}/${record.total} of AWB ${record.awb} saved — ready for next scan`);

    // Call 2: separate follow-up call to attach the image to that record.
    if (canvas) {
      imageStatusCell.textContent = 'uploading…';
      canvas.toBlob(async (blob) => {
        const imgResult = await attachImage(createResult.id, blob);
        imageStatusCell.textContent = imgResult.error ? 'image-failed' : 'image-attached';
      }, 'image/jpeg', 0.7);
    } else {
      imageStatusCell.textContent = 'no-frame-captured';
    }
  }

  scheduleRevertToScanning();
}

(async () => {
  setModeBanner();

  const scanner = new Html5Qrcode('reader');
  scanner.start(
    { facingMode: 'environment' },
    {
      fps: 10,
      // Responsive scan box: sized from the ACTUAL rendered viewfinder
      // dimensions every time, instead of a fixed pixel box that stops
      // matching reality the moment screen size or zoom changes.
      qrbox: (viewfinderWidth, viewfinderHeight) => ({
        width: Math.floor(viewfinderWidth * 0.85),
        height: Math.floor(viewfinderHeight * 0.35),
      }),
      videoConstraints: {
        facingMode: 'environment',
        width: { ideal: 1920 },
        height: { ideal: 1080 },
      },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.QR_CODE,
      ],
      // Prefer the browser's native barcode detector when available
      // (Chrome/Android) — generally more reliable on 1D barcodes than
      // the pure-JS fallback decoder.
      experimentalFeatures: { useBarCodeDetectorIfSupported: true },
    },
    (decodedText) => onDecoded(decodedText),
    () => { /* per-frame decode failure, expected while no barcode in view — ignore */ }
  ).catch(err => {
    document.getElementById('reader').textContent =
      'Camera unavailable: ' + err + ' (try over https:// or localhost, and grant camera permission).';
  });
})();
</script>
</body>
</html>
