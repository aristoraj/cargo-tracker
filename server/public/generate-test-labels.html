<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Test Label Generator — Cargo Prototype</title>
<script src="https://cdn.jsdelivr.net/npm/bwip-js@4/dist/bwip-js-min.js"></script>
<style>
  @page { size: A4; margin: 8mm; }

  body { font-family: Arial, sans-serif; background: #ddd; margin: 0; padding: 20px; }
  .controls { background: #fff; padding: 16px; border-radius: 8px; margin-bottom: 20px; max-width: 700px; }
  .controls label { display: block; margin-top: 8px; font-size: 13px; color: #333; }
  .controls input { width: 100%; padding: 6px; box-sizing: border-box; font-size: 14px; }
  .controls button { margin-top: 14px; padding: 10px 18px; font-size: 14px; cursor: pointer; }

  /* 2 columns x 2 rows = 4 labels per A4 page at 100% print scale.
     Label height still hugs its content — with only 2 per row there's
     enough width to size everything up and stay readable. */
  #labels { display: flex; flex-wrap: wrap; gap: 4mm; align-content: flex-start; }

  .label {
    width: 95mm; box-sizing: border-box; background: #fff; border: 2px solid #000;
    padding: 4mm; font-family: Arial, sans-serif; display: flex; flex-direction: column; gap: 2.5mm;
    font-size: 10px;
  }
  .label .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    border-bottom: 2px solid #000; padding-bottom: 2.5mm;
  }
  .label .header .service { font-weight: bold; font-size: 13px; line-height: 1.15; }
  .label .header .badges { display: flex; flex-direction: column; align-items: flex-end; gap: 1.5mm; }
  .label .header .wpx-badge { border: 2px solid #000; padding: 1px 6px; font-weight: bold; font-size: 13px; }
  .label .header .dhl-logo {
    background: #ffcc00; color: #d40511; font-weight: 900; font-style: italic;
    font-size: 16px; padding: 1px 5px; letter-spacing: 0.5px;
  }

  .label .origin-line { font-size: 9.5px; color: #333; }

  .label .dest-bar {
    background: #000; color: #fff; padding: 3mm; display: flex; align-items: center; gap: 3mm;
  }
  .label .dest-bar .c-badge { border: 2px solid #fff; padding: 1px 6px; font-size: 12px; font-weight: bold; }
  .label .dest-bar .dest-code { font-size: 23px; font-weight: 900; letter-spacing: 0.4px; flex: 1; word-break: break-word; }

  .label .country-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; }
  .label .country-row .country { font-weight: bold; font-size: 13px; }

  .label .consignee { font-size: 11px; font-weight: bold; line-height: 1.3; border-bottom: 1px solid #999; padding-bottom: 2.5mm; }

  .label .weight-row { display: flex; justify-content: space-between; font-size: 9.5px; }
  .label .weight-row .piece-count { font-size: 18px; font-weight: 900; }

  .label .barcode-block { margin-top: 5mm; display: flex; flex-direction: column; align-items: center; }
  .label .barcode-block .ref-line { font-size: 9px; text-align: center; margin-top: 1.5mm; }
  .label canvas { width: 42mm; height: 42mm; }

  @media print {
    .controls, h1 { display: none; }
    /* Let the browser pack as many labels per page as actually fit —
       no fixed per-page count now that height is content-driven. */
    .label { break-inside: avoid; page-break-inside: avoid; }
  }
</style>
</head>
<body>

<h1>Test Label Generator (Cargo Prototype) — 4-up on A4 (2x2)</h1>

<div class="controls">
  <label>AWB / Waybill No
    <input id="awb" value="4062665515">
  </label>
  <label>Destination code (e.g. IN-COK-EKM)
    <input id="dest" value="IN-COK-EKM">
  </label>
  <label>Ref / cargo doc no
    <input id="ref" value="AFY24-0183">
  </label>
  <label>Consignee name / address
    <input id="consignee" value="ERNAKULAM 682314&#10;MULATHURUTHY">
  </label>
  <label>Weight (e.g. 4.5/40.5 Kg)
    <input id="weight" value="4.5/40.5 Kg">
  </label>
  <label>Total pieces
    <input id="total" type="number" value="9" min="1" max="50">
  </label>
  <button onclick="generate()">Generate Labels</button>
  <button onclick="window.print()">Print</button>
</div>

<div id="labels"></div>

<script>
function buildPayload(awb, piece, total, dest, ref) {
  // Pipe-delimited single string encoded in ONE barcode per label —
  // one scan is enough to recover every field. Mirrors what the
  // real scanner-widget.html expects to parse.
  return `AWB:${awb}|PC:${piece}/${total}|DEST:${dest}|REF:${ref}`;
}

function generate() {
  const awb = document.getElementById('awb').value.trim();
  const dest = document.getElementById('dest').value.trim();
  const ref = document.getElementById('ref').value.trim();
  const consignee = document.getElementById('consignee').value.trim();
  const weight = document.getElementById('weight').value.trim();
  const total = parseInt(document.getElementById('total').value, 10);

  const container = document.getElementById('labels');
  container.innerHTML = '';

  for (let piece = 1; piece <= total; piece++) {
    const payload = buildPayload(awb, piece, total, dest, ref);

    const div = document.createElement('div');
    div.className = 'label';
    div.innerHTML = `
      <div class="header">
        <div class="service">EXPRESS<br>WORLDWIDE</div>
        <div class="badges">
          <div class="wpx-badge">WPX</div>
          <div class="dhl-logo">DHL</div>
        </div>
      </div>

      <div class="origin-line">Origin: PVG &nbsp;→&nbsp; AWB ${awb}</div>

      <div class="dest-bar">
        <div class="c-badge">C</div>
        <div class="dest-code">${dest}</div>
      </div>

      <div class="country-row">
        <span>India</span>
        <span class="country">L</span>
      </div>

      <div class="consignee">${consignee.replace(/\n/g, '<br>')}</div>

      <div class="weight-row">
        <span>${weight}</span>
        <span class="piece-count">${piece} / ${total}</span>
      </div>

      <div class="barcode-block">
        <canvas id="bc-${piece}"></canvas>
        <div class="ref-line">Ref: ${ref}</div>
      </div>
    `;
    container.appendChild(div);

    // QR instead of Code128 — our payload (~45+ chars combining AWB, piece,
    // destination, ref) is long for a 1D barcode to print reliably at label
    // size; QR handles it as a compact 2D code that's far easier to scan.
    bwipjs.toCanvas(`bc-${piece}`, {
      bcid: 'qrcode',
      text: payload,
      scale: 3,
      eclevel: 'M',
    });
  }
}

generate();
</script>
</body>
</html>
